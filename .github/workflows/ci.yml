name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  test-py:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3
      - name: Test Python syntax
        run: |
          test -f service-py/app.py && echo "app.py exists OK"
          test -f service-py/requirements.txt && echo "requirements.txt exists OK"

  test-go:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3
      - name: Test Go syntax
        run: |
          test -f service-go/main.go && echo "main.go exists OK"
          test -f service-go/go.mod && echo "go.mod exists OK"

  build-py:
    runs-on: self-hosted
    needs: test-py
    steps:
      - uses: actions/checkout@v3
      - name: Build and push Python image
        run: |
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          docker build -t zema1309/service-py:${{ github.sha }} ./service-py
          docker push zema1309/service-py:${{ github.sha }}
          docker tag zema1309/service-py:${{ github.sha }} zema1309/service-py:latest
          docker push zema1309/service-py:latest

  build-go:
    runs-on: self-hosted
    needs: test-go
    steps:
      - uses: actions/checkout@v3
      - name: Build and push Go image
        run: |
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          docker build -t zema1309/service-go:${{ github.sha }} ./service-go
          docker push zema1309/service-go:${{ github.sha }}
          docker tag zema1309/service-go:${{ github.sha }} zema1309/service-go:latest
          docker push zema1309/service-go:latest

  update-infra:
    runs-on: self-hosted
    needs: [build-py, build-go]
    steps:
      - name: Update infra repo
        run: |
          rm -rf /tmp/infra
          git clone https://bogdanzemly-va:${{ secrets.GH_TOKEN }}@github.com/bogdanzemly-va/infra.git /tmp/infra
          cd /tmp/infra
          git config user.email "bogdan.zemly@gmail.com"
          git config user.name "bogdanzemly-va"
          sed -i "s/tag:.*/tag:\ \"${{ github.sha }}\"/" service-py/values.yaml
          sed -i "s/tag:.*/tag:\ \"${{ github.sha }}\"/" service-go/values.yaml
          git commit -am "Update image tag to ${{ github.sha }}"
          git push

  notify-success:
    runs-on: self-hosted
    needs: update-infra
    if: success()
    steps:
      - name: Send Telegram notification
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          MESSAGE="✅ *Деплой успешен*%0A%0AРепозиторий: \`${{ github.repository }}\`%0AКоммит: \`${SHORT_SHA}\`%0AАвтор: ${{ github.actor }}%0AСообщение: ${{ github.event.head_commit.message }}%0A%0AОбразы обновлены и Flux применит изменения в течение минуты."
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --proxy "http://10.8.0.27:1080" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=Markdown"

  notify-failure:
    runs-on: self-hosted
    needs: [test-py, test-go, build-py, build-go, update-infra]
    if: failure()
    steps:
      - name: Send Telegram failure notification
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          MESSAGE="❌ *Деплой упал*%0A%0AРепозиторий: \`${{ github.repository }}\`%0AКоммит: \`${SHORT_SHA}\`%0AАвтор: ${{ github.actor }}%0AСообщение: ${{ github.event.head_commit.message }}%0A%0AПроверь логи: https://github.com/${{ github.repository }}/actions"
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --proxy "http://10.8.0.27:1080" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=Markdown"
